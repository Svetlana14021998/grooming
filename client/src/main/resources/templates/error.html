<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{error.title}">Royal Fluff - Error</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"/>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">
            <span class="logo-icon">🐾</span>
            <span class="logo-text" th:text="#{zoo-name}">Royal Fluff</span>
        </div>
        <div class="nav-menu">
            <a th:href="@{/main}" class="nav-link" id="main-id">
                <span class="logo-icon">✨</span>
                <span th:text="#{nav.main}">Main</span>
            </a>
            <a th:href="@{/services}" class="nav-link" id="services-id">
                <span class="logo-icon">✂️</span>
                <span th:text="#{nav.services}">Services</span>
            </a>
            <a th:href="@{/masters}" class="nav-link" id="masters-id">
                <span class="logo-icon">👩‍🔧</span>
                <span th:text="#{nav.masters}">Our masters</span>
            </a>
            <a th:href="@{/contacts}" class="nav-link" id="contacts-id">
                <span class="logo-icon">📍</span>
                <span th:text="#{nav.contacts}">Contacts</span>
            </a>
            <a th:href="@{/feedback}" class="nav-link" id="feedback-id">
                <span class="logo-icon">💬</span>
                <span th:text="#{nav.feedback}">Feedback</span>
            </a>
            <a th:href="@{/faq}" class="nav-link">
                <span class="logo-icon">❓</span>
                <span th:text="#{nav.faq}">FAQ</span>
            </a>
            <a th:href="@{/article}" class="nav-link" id="articles-id">
                <span class="logo-icon">📝</span>
                <span th:text="#{nav.articles}">Articles</span>
            </a>
        </div>
        <div class="language-switcher">
            <a href="error.html" th:href="@{${currentUrl}(lang=en)}"
               class="lang-link" title="English" id="eng-id">
                <span class="fi fi-gb"></span>
            </a>
            <a href="error.html" th:href="@{${currentUrl}(lang=ru)}"
               class="lang-link" title="Русский" id="rus-id">
                <span class="fi fi-ru"></span>
            </a>
        </div>
    </div>
</div>

<div class="error-container">
    <div class="error-card">
        <div class="error-icon">
            <span>🐾</span>
            <span>😿</span>
            <span>🐾</span>
        </div>

        <h1 class="error-code" th:text="${errorCode} ?: '404'">404</h1>

        <h2 class="error-title" th:text="#{error_title}">Oops! Something went wrong</h2>

        <div class="error-actions">
            <a th:href="@{/main}" class="error-btn error-btn-primary">
                <span>🏠</span>
                <span th:text="#{error_back_home}">Back to Home</span>
            </a>
        </div>

        <div class="error-help">
            <p th:text="#{error_help}">Need help? Contact us:</p>
            <a  th:href="@{/contacts} + '#feedbackForm'" class="error-contact-link" th:text="#{error_contact_link}">Contact Support</a>
        </div>
    </div>
</div>

<footer>
    <p>
        <span>©
        <span th:text="${#calendars.year(#calendars.createNow())}"></span>
        </span>
        <span th:text="#{zoo_info}">Royal Fluff — Pet Grooming Salon. All rights reserved.</span>
    </p>
</footer>

</body>
</html>
