<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; background-color: #f0ece4;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f0ece4">
    <tr>
        <td align="center" style="padding: 30px 20px;">

            <table width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" style="width: 600px; max-width: 600px; border-collapse: collapse; position: relative;">

                <tr>
                    <td bgcolor="#2c3e2f" style="background-color: #2c3e2f; padding: 30px 20px; position: relative;" align="center">

                        <div style="position: absolute; top: 10px; left: 15px; font-size: 20px; opacity: 0.15; color: #ffffff;">🐾🐾</div>
                        <div style="position: absolute; top: 50px; right: 20px; font-size: 16px; opacity: 0.12; color: #ffffff;">🐾</div>
                        <div style="position: absolute; bottom: 15px; left: 30px; font-size: 18px; opacity: 0.1; color: #ffffff;">🐾🐾</div>
                        <div style="position: absolute; bottom: 40px; right: 10px; font-size: 14px; opacity: 0.12; color: #ffffff;">🐾</div>
                        <div style="position: absolute; top: 70px; left: 60px; font-size: 12px; opacity: 0.1; color: #ffffff;">🐾</div>
                        <div style="position: absolute; bottom: 60px; left: 100px; font-size: 15px; opacity: 0.08; color: #ffffff;">🐾</div>

                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td align="center" style="font-size: 48px;">🐾</td>
                            </tr>
                            <tr>
                                <td align="center" style="color: #ffd700; font-size: 28px; font-weight: bold; padding-top: 10px;">Royal Fluff</td>
                            </tr>
                            <tr>
                                <td align="center" style="color: #ffffff; font-size: 16px; padding-top: 8px;">Новое сообщение с сайта</td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 30px 25px;" bgcolor="#ffffff">

                        <div style="position: absolute; top: 250px; right: 15px; font-size: 30px; opacity: 0.04; color: #2c3e2f;">🐾</div>
                        <div style="position: absolute; bottom: 100px; left: 10px; font-size: 25px; opacity: 0.03; color: #2c3e2f;">🐾</div>

                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 25px;">
                            <tr>
                                <td style="background-color: #f8f4ed; padding: 15px 20px; border-radius: 12px;">
                                    <div style="font-weight: bold; color: #2c3e2f; font-size: 14px; margin-bottom: 8px;">📝 ИМЯ</div>
                                    <div style="color: #333333; font-size: 18px; font-weight: 500;" th:text="${data.name}">—</div>
                                </td>
                            </tr>
                        </table>

                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 25px;">
                            <tr>
                                <td style="background-color: #f8f4ed; padding: 15px 20px; border-radius: 12px;">
                                    <div style="font-weight: bold; color: #2c3e2f; font-size: 14px; margin-bottom: 8px;">📧 EMAIL</div>
                                    <div style="color: #333333; font-size: 16px; word-break: break-all;" th:text="${data.email}">—</div>
                                </td>
                            </tr>
                        </table>

                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 25px;">
                            <tr>
                                <td style="background-color: #f8f4ed; padding: 15px 20px; border-radius: 12px;">
                                    <div style="font-weight: bold; color: #2c3e2f; font-size: 14px; margin-bottom: 8px;">📞 ТЕЛЕФОН</div>
                                    <div style="color: #333333; font-size: 18px;" th:text="${data.phone}">—</div>
                                </td>
                            </tr>
                        </table>

                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td style="background-color: #f0e6d5; padding: 20px; border-radius: 12px;">
                                    <div style="font-weight: bold; color: #2c3e2f; font-size: 14px; margin-bottom: 12px;">💬 СООБЩЕНИЕ</div>
                                    <div style="color: #333333; font-size: 16px; line-height: 1.6; white-space: pre-wrap;" th:text="${data.message}">—</div>
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <tr>
                    <td bgcolor="#2c3e2f" style="background-color: #2c3e2f; padding: 20px; position: relative;" align="center">

                        <div style="position: absolute; top: 10px; left: 20px; font-size: 14px; opacity: 0.12; color: #ffd700;">🐾</div>
                        <div style="position: absolute; bottom: 8px; right: 20px; font-size: 16px; opacity: 0.1; color: #ffd700;">🐾🐾</div>

                        <div style="color: #ffd700; font-size: 12px; line-height: 1.5;">
                            © 2026 Royal Fluff - Груминг салон<br>
                            Это письмо отправлено автоматически, пожалуйста, не отвечайте на него.
                        </div>
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
