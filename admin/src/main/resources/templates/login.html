<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Fluff - Admin Login</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"/>
</head>
<body class="admin-login-body">

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="logo">
                <span class="logo-icon">🐾</span>
                <span class="logo-text">Royal Fluff Admin</span>
            </div>
            <h2>🔐 Вход в систему</h2>
            <p>Введите ваши учётные данные</p>
        </div>

        <div th:if="${param.error}" class="error-message">
            <span>❌</span> Неверный логин или пароль
        </div>

        <div th:if="${param.logout}" class="logout-message">
            <span>✅</span> Вы успешно вышли из системы
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label>👤 Логин</label>
                <input type="text" name="username" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label>🔒 Пароль</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Войти</button>
        </form>
        <div class="forgot-password">
            <a th:href="@{/profile/reset-password}" class="forgot-link">❓ Забыли пароль?</a>
        </div>
    </div>
</div>
</body>
</html>
