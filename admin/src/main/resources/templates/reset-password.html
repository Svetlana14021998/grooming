<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Fluff - Сброс пароля</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/reset-password.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"/>
</head>
<body class="reset-password-body">

<div class="reset-container">
    <div class="reset-card">
        <div class="reset-header">
            <div class="logo">
                <span class="logo-icon">🐾</span>
                <span class="logo-text">Royal Fluff Admin</span>
            </div>
            <h2>🔐 Сброс пароля</h2>
            <p>Введите ваш логин, чтобы сбросить пароль</p>
        </div>

        <!-- Сообщение об ошибке -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <span>❌</span> <span id="errorText"></span>
        </div>

        <!-- Сообщение об успехе -->
        <div id="successMessage" class="success-message" style="display: none;">
            <span>✅</span> <span id="successText"></span>
        </div>

        <form id="resetForm" class="reset-form">
            <div class="form-group">
                <label>👤 Логин</label>
                <input type="text" id="username" name="username" placeholder="Введите ваш логин" required autofocus>
            </div>
            <button type="submit" class="reset-btn">🔄 Сбросить пароль</button>
        </form>

        <div class="back-to-login">
            <a th:href="@{/login}" class="back-link">← Вернуться к форме входа</a>
        </div>
    </div>
</div>
<script>
    let redirectTimeout = null;

     document.getElementById('resetForm').addEventListener('submit', async (e) => {
         e.preventDefault();

         // Очищаем предыдущий таймер, если есть
         if (redirectTimeout) {
             clearTimeout(redirectTimeout);
             redirectTimeout = null;
         }

         const username = document.getElementById('username').value;
         const errorDiv = document.getElementById('errorMessage');
         const successDiv = document.getElementById('successMessage');

         // Скрываем предыдущие сообщения
         errorDiv.style.display = 'none';
         successDiv.style.display = 'none';

         if (!username) {
             errorDiv.querySelector('#errorText').textContent = 'Введите логин';
             errorDiv.style.display = 'block';
             return;
         }

         try {
             const response = await fetch('/adminapp/profile/password', {
                 method: 'POST',
                 headers: {
                     'Content-Type': 'application/json'
                 },
                 body: JSON.stringify({ username: username })
             });

             const result = await response.text();

             if (response.ok) {
                 // Показываем сообщение об успехе
                 successDiv.querySelector('#successText').textContent = result;
                 successDiv.style.display = 'block';
                 document.getElementById('username').value = '';

                 // Через 10 секунд перенаправляем на страницу логина
                 redirectTimeout = setTimeout(() => {
                     window.location.href = '/adminapp/login';
                 }, 10000);
             } else {
                 errorDiv.querySelector('#errorText').textContent = result;
                 errorDiv.style.display = 'block';
             }
         } catch (error) {
             errorDiv.querySelector('#errorText').textContent = 'Ошибка соединения. Попробуйте позже.';
             errorDiv.style.display = 'block';
         }
     });
</script>

</body>
</html>
