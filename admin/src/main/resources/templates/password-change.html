<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Fluff - Смена пароля</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/password-change.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"/>
</head>
<body>

<div class="admin-navbar">
    <div class="admin-nav-container">
        <div class="logo">
            <span class="logo-icon">🐾</span>
            <span class="logo-text">Royal Fluff <span class="admin-badge">ADMIN</span></span>
        </div>
        <div class="admin-nav-menu">
            <a th:href="@{/dashboard}" class="nav-link"><span>🏠</span> Главная</a>
            <a th:href="@{/tasks}" class="nav-link"><span>📋</span> Мои задачи
                <span class="badge" th:text="${tasksCount != null ? tasksCount : 0}">0</span></a>
            <a th:href="@{/schedule}" class="nav-link" sec:authorize="hasRole('MASTER')">
                <span>📅</span> Мое расписание</a>
            <a th:href="@{/article}" class="nav-link" sec:authorize="hasRole('MASTER')">
                <span>📝</span> Статьи</a>
            <a th:href="@{/employee-info}" class="nav-link"><span>📞</span> Сотрудники</a>
            <a th:href="@{/profile}" class="nav-link"><span>👤</span> Профиль</a>
        </div>
        <div class="admin-user-menu">
            <span class="user-name" sec:authentication="principal.fullName">Администратор</span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">🚪 Выход</button>
            </form>
        </div>
    </div>
</div>

<div class="password-page">
    <div class="password-container">
        <div class="password-header">
            <h1>🔐 Смена пароля</h1>
            <p>Для безопасности рекомендуется регулярно менять пароль</p>
        </div>

        <form id="passwordForm" class="password-form">
            <!-- Текущий пароль -->
            <div class="form-group">
                <label>Текущий пароль *</label>
                <div class="password-input-wrapper">
                    <input type="password" id="currentPassword" name="currentPassword" class="form-control"  autofocus>
                    <button type="button" class="toggle-password" data-target="currentPassword">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>
                <div class="field-error" id="currentPasswordError"></div>
            </div>

            <!-- Новый пароль -->
            <div class="form-group">
                <label>Новый пароль *</label>
                <div class="password-input-wrapper">
                    <input type="password" id="newPassword" name="newPassword" class="form-control" >
                    <button type="button" class="toggle-password" data-target="newPassword">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>
                <div class="field-error" id="newPasswordError"></div>
            </div>

            <div class="form-group">
                <label>Подтверждение нового пароля *</label>
                <div class="password-input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" >
                    <button type="button" class="toggle-password" data-target="confirmPassword">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>
                <div class="field-error" id="confirmPasswordError"></div>
            </div>

            <!-- Сообщение об ошибке -->
            <div id="passwordError" class="error-message"></div>
            <div id="passwordSuccess" class="success-message"></div>

            <!-- Кнопки -->
            <div class="form-actions">
                <button type="submit" class="save-btn">💾 Сменить пароль</button>
                <a th:href="@{/profile}" class="cancel-btn">Отмена</a>
            </div>
        </form>
    </div>
</div>

<footer class="admin-footer">
    <p>© <span th:text="${#calendars.year(#calendars.createNow())}"></span> Royal Fluff — Административная панель</p>
</footer>

<script>
    // Показать/скрыть пароль при удержании кнопки
    document.querySelectorAll('.toggle-password').forEach(button => {
        const targetId = button.dataset.target;
        const input = document.getElementById(targetId);

        button.addEventListener('mousedown', function() {
            input.type = 'text';
        });

        button.addEventListener('mouseup', function() {
            input.type = 'password';
        });

        button.addEventListener('mouseleave', function() {
            input.type = 'password';
        });

        button.addEventListener('click', (e) => {
            e.preventDefault();
        });
    });

    // Функция для отображения ошибок полей
    function showFieldErrors(errors) {
        // Очищаем предыдущие ошибки
        document.querySelectorAll('.field-error').forEach(el => {
            el.classList.remove('show');
            el.textContent = '';
        });
        document.querySelectorAll('.form-control').forEach(el => {
            el.classList.remove('is-invalid');
        });

        if (errors) {
            Object.keys(errors).forEach(field => {
                const errorMessage = errors[field];
                const errorElement = document.getElementById(field + 'Error');
                if (errorElement) {
                    errorElement.textContent = errorMessage;
                    errorElement.classList.add('show');
                }

                // Подсвечиваем поле
                const inputElement = document.getElementById(field);
                if (inputElement) {
                    inputElement.classList.add('is-invalid');
                }
            });
        }
    }

    // Отправка PUT запроса
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Очищаем предыдущие сообщения
        document.getElementById('passwordError').classList.remove('show');
        document.getElementById('passwordError').textContent = '';
        document.getElementById('passwordSuccess').classList.remove('show');
        document.getElementById('passwordSuccess').textContent = '';
        showFieldErrors(null);

        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        try {
            const response = await fetch('/adminapp/profile/password', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    currentPassword: currentPassword,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword
                })
            });

            const result = await response.json();

            if (response.ok) {
                // Успех
                document.getElementById('passwordSuccess').textContent = result.message || 'Пароль успешно изменён!';
                document.getElementById('passwordSuccess').classList.add('show');

                // Очищаем поля формы
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

                // Через 2 секунды перенаправляем на профиль
                setTimeout(() => {
                    window.location.href = '/adminapp/profile';
                }, 2000);
            } else {
                // Ошибка
                if (result.errors) {
                    // Показываем ошибки для конкретных полей
                    showFieldErrors(result.errors);

                    // Если есть общая ошибка
                    if (result.message) {
                        document.getElementById('passwordError').textContent = result.message;
                        document.getElementById('passwordError').classList.add('show');
                    }
                } else {
                    // Общая ошибка без деталей
                    document.getElementById('passwordError').textContent = result.message || 'Ошибка при смене пароля';
                    document.getElementById('passwordError').classList.add('show');
                }
            }
        } catch (error) {
            document.getElementById('passwordError').textContent = 'Ошибка соединения. Попробуйте позже.';
            document.getElementById('passwordError').classList.add('show');
        }
    });
</script>

</body>
</html>
